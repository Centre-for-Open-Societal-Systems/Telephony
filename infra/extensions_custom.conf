[from-missed-call]
; Inbound call flow: ring → answer → play greeting → hangup.
; Lead capture is handled by lead-service via AMI (Hangup events).
;
; NOTE: This is a reference copy. Terraform user_data deploys this
; automatically. Edit this file if you need to customize the call flow,
; then re-deploy or manually copy to /etc/asterisk/extensions_custom.conf.

exten => _+.,1,NoOp(INCOMING CALL TO: ${EXTEN} FROM: ${CALLERID(num)})
exten => _+.,n,Set(__CALLED_NUM=${EXTEN})

exten => _+.,n,Ringing()
exten => _+.,n,Wait(2)

exten => _+.,n,Answer()
exten => _+.,n,Wait(1)

exten => _+.,n,Playback(custom/greeting)

exten => _+.,n,Hangup()

exten => h,1,NoOp(Call ended — context=${CONTEXT} uniqueid=${UNIQUEID})
