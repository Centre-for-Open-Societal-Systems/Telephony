services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lead_db}
      POSTGRES_USER: ${POSTGRES_USER:-lead_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lead_password}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lead_user} -d ${POSTGRES_DB:-lead_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  lead-service:
    build:
      context: ./service
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lead_db}
      DB_USER: ${POSTGRES_USER:-lead_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-lead_password}
      AMI_ENABLED: ${AMI_ENABLED:-false}
      AMI_HOST: ${AMI_HOST:-127.0.0.1}
      AMI_PORT: ${AMI_PORT:-5038}
      AMI_USERNAME: ${AMI_USERNAME:-lead-ami}
      AMI_SECRET: ${AMI_SECRET:-changeme}
      LEAD_CONTEXT: ${LEAD_CONTEXT:-from-missed-call}
      LEAD_REGISTRY_URL: ${LEAD_REGISTRY_URL:-}
      LEAD_REGISTRY_API_KEY_HEADER: ${LEAD_REGISTRY_API_KEY_HEADER:-}
      LEAD_REGISTRY_API_KEY_VALUE: ${LEAD_REGISTRY_API_KEY_VALUE:-}
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
